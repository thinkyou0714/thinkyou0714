name: lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: ShellCheck hooks
        run: shellcheck .claude/hooks/*.sh

      - name: Validate .claude/settings.json
        run: python3 -m json.tool .claude/settings.json > /dev/null

      - name: Validate workflow YAML
        run: |
          python3 -m pip install --quiet pyyaml
          python3 - <<'PY'
          import glob, sys, yaml
          bad = 0
          for f in sorted(glob.glob(".github/workflows/*.yml")):
              try:
                  yaml.safe_load(open(f))
              except yaml.YAMLError as e:
                  print(f"::error file={f}::{e}")
                  bad += 1
          sys.exit(1 if bad else 0)
          PY

      # Offline = no flaky external HTTP; --include-fragments verifies #anchors
      # against local headings (catches broken cross-links like #4-goal-handoff-template).
      - name: Check markdown links & anchors
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "--offline --include-fragments --no-progress ."
          fail: true

name: Metrics

on:
  schedule:
    - cron: '17 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # This job commits the SVG; let an in-flight run finish rather than cancel it
  # mid-commit. Overlapping triggers queue instead of racing.
  cancel-in-progress: false

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          filename: github-metrics.svg
          output_action: commit
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: thinkyou0714
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Tokyo

          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used

          plugin_followup: yes
          plugin_introduction: yes
          plugin_introduction_title: yes

          plugin_topics: yes
          plugin_topics_limit: 12
          plugin_topics_mode: starred

          plugin_lines: yes
          plugin_lines_history_limit: 1

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_stars: yes
          plugin_stars_limit: 6

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes

          commits_authoring: thinkyou0714, ${{ github.repository_owner }}

          config_padding: 0, 0 + 1.8em
          config_animations: no

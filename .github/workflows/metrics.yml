name: Metrics

on:
  schedule:
    - cron: '17 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          output_action: commit
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: thinkyou0714
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Tokyo

          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used

          plugin_followup: yes
          plugin_introduction: yes
          plugin_introduction_title: yes

          plugin_topics: yes
          plugin_topics_limit: 12
          plugin_topics_mode: starred

          plugin_lines: yes
          plugin_lines_history_limit: 1

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_stars: yes
          plugin_stars_limit: 6

          commits_authoring: thinkyou0714, ${{ github.repository_owner }}

          config_padding: 0, 0 + 1.8em
          config_animations: no
